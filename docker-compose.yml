# =============================================================================
# aify-comms - Docker Compose
# =============================================================================
# Override ports, resources, etc. in docker-compose.override.yml
# The service is the stateful dashboard/API container. Host-side bridges run
# outside Docker on the machines that should execute Codex/Claude/OpenCode.

services:
  service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_PORT: ${SERVICE_PORT:-8800}
    container_name: ${COMPOSE_PROJECT_NAME:-aify-comms}-service
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "${SERVICE_PORT:-8800}:8800"
    volumes:
      - service-data:/data
      - ./config:/app/config:ro
      # Mount Claude Code auth from host — enables trigger/dispatch inside container
      # Uses your Max subscription, no API key needed
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/home/service/.claude:ro
    env_file:
      - .env
    environment:
      - SERVICE_PORT=${SERVICE_PORT:-8800}
      - DATA_DIR=/data
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2}"
          memory: ${MEMORY_LIMIT:-4g}
    networks:
      - service-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SERVICE_PORT:-8800}/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  service-data:
    name: ${DATA_VOLUME_NAME:-aify-comms-data}
    external: ${DATA_VOLUME_EXTERNAL:-false}

networks:
  service-network:
    name: ${COMPOSE_PROJECT_NAME:-aify-comms}-network
    driver: bridge
